<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Soma</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Calculadora de Soma</h1>

      <form id="calculadora">
        <div class="form-group">
          <label for="numero1">Número 1:</label>
          <input
            type="number"
            name="numero1"
            id="numero1"
            placeholder="Digite o primeiro número"
            required
            step="any"
          />
          <!-- Mensagem de erro para o primeiro número -->
          <div id="erro1" class="mensagem-erro-campo"></div>
        </div>

        <div class="form-group">
          <label for="numero2">Número 2:</label>
          <input
            type="number"
            name="numero2"
            id="numero2"
            placeholder="Digite o segundo número"
            required
            step="any"
          />
          <!-- Mensagem de erro para o segundo número -->
          <div id="erro2" class="mensagem-erro-campo"></div>
        </div>

        <div class="form-group">
          <label for="somatorio">Total da Soma:</label>
          <input
            type="text"
            name="soma"
            id="somatorio"
            placeholder="Resultado"
            readonly
          />
        </div>

        <div class="button-group">
          <button type="reset" class="btn-limpar">Limpar</button>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
